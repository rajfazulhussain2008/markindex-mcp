    <text x="0" y="0"><tspan fill="#61afef">&gt;</tspan> read_section(doc_id=<tspan fill="#98c379">"sample-policy"</tspan>, section_title=<tspan fill="#e5c07b">"company-travel-policy-vehicle-compensation"</tspan>)</text>
    <text x="0" y="40"><tspan fill="#61afef">## Vehicle Compensation</tspan></text>
    <text x="0" y="80">Employees may claim compensation for approved business travel using personal vehicles.</text>
    <text x="0" y="110">Claims must include date, distance, purpose, and manager approval.</text>
