<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
    <defs>
        <!-- Background Gradient -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0d1117"/>
            <stop offset="100%" stop-color="#161b22"/>
        </linearGradient>
        
        <!-- Text Gradient -->
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#58a6ff"/>
            <stop offset="100%" stop-color="#39d353"/>
        </linearGradient>
        
        <!-- Grid Pattern -->
        <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
        </pattern>
        
        <!-- Drop Shadow -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.5"/>
        </filter>
    </defs>
    
    <!-- Background Layer -->
    <rect width="1000" height="300" fill="url(#bg)"/>
    <rect width="1000" height="300" fill="url(#grid)"/>

    <!-- Central Graphics Layer -->
    <g transform="translate(500, 95)" filter="url(#shadow)">
        <!-- A stylized document / database icon -->
        <!-- Center polygon -->
        <path d="M 0 -35 L 35 -15 L 35 25 L 0 45 L -35 25 L -35 -15 Z" fill="#1f242c" stroke="#58a6ff" stroke-width="2"/>
        
        <!-- Inner accents -->
        <path d="M -35 -15 L 0 5 L 35 -15" fill="none" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.6"/>
        <path d="M 0 5 L 0 45" fill="none" stroke="#58a6ff" stroke-width="2" stroke-opacity="0.6"/>
        
        <!-- Floating document layers -->
        <rect x="-65" y="-20" width="30" height="40" rx="3" fill="#0d1117" stroke="#39d353" stroke-width="1.5" opacity="0.9"/>
        <line x1="-55" y1="-10" x2="-45" y2="-10" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="-55" y1="-2" x2="-40" y2="-2" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="-55" y1="6" x2="-50" y2="6" stroke="#39d353" stroke-width="1.5" stroke-linecap="round"/>

        <rect x="35" y="-10" width="30" height="40" rx="3" fill="#0d1117" stroke="#a371f7" stroke-width="1.5" opacity="0.9"/>
        <line x1="45" y1="0" x2="55" y2="0" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="45" y1="8" x2="60" y2="8" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="45" y1="16" x2="50" y2="16" stroke="#a371f7" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Typography -->
    <g transform="translate(500, 185)">
        <text x="-10" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="white" text-anchor="end" letter-spacing="0">Mark<tspan fill="url(#textGrad)">Index</tspan></text>
        
        <rect x="10" y="-38" width="64" height="34" rx="17" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
        <text x="42" y="-14" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#8b949e" text-anchor="middle">MCP</text>

        <text x="0" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#c9d1d9" letter-spacing="0.5" text-anchor="middle">Enterprise Document Intelligence Server</text>
        <text x="0" y="80" font-family="ui-monospace, SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace" font-size="14" fill="#8b949e" text-anchor="middle">&gt; TF-IDF Search • Hierarchical Markdown • Stable Section IDs</text>
    </g>
</svg>
